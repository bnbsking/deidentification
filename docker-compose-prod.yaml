services:
  deid:
    build:
      context: .
      dockerfile: Dockerfile
    image: 192.168.161.132:5000/deid:v0
    container_name: deid
    working_dir: /app
    ports:
      - "8006:8006"
    environment:
      API_KEYS_PATH: /app/cfgs/api_keys.yaml
    volumes:
      - ./:/app
    command: "bash /app/env.sh"
